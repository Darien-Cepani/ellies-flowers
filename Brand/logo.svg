<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 260" width="520" height="260" role="img" aria-label="Anja's Flowers — Flowers & Roses · Tirana">
  <rect width="520" height="260" fill="#FBF3EC"/>

  <!-- Garden bloom / rose mark -->
  <g transform="translate(260 78)">
    <!-- outer petals -->
    <g fill="#C56B5A">
      <ellipse cx="0" cy="-26" rx="13" ry="22"/>
      <ellipse cx="0" cy="-26" rx="13" ry="22" transform="rotate(60)"/>
      <ellipse cx="0" cy="-26" rx="13" ry="22" transform="rotate(120)"/>
      <ellipse cx="0" cy="-26" rx="13" ry="22" transform="rotate(180)"/>
      <ellipse cx="0" cy="-26" rx="13" ry="22" transform="rotate(240)"/>
      <ellipse cx="0" cy="-26" rx="13" ry="22" transform="rotate(300)"/>
    </g>
    <!-- inner rose detail -->
    <circle cx="0" cy="0" r="17" fill="#9E4031"/>
    <path d="M0 -10 a10 10 0 1 1 -9 6" fill="none" stroke="#FBF3EC" stroke-width="2.4" stroke-linecap="round"/>
    <path d="M0 -4 a4.5 4.5 0 1 1 -4 3" fill="none" stroke="#FBF3EC" stroke-width="2.2" stroke-linecap="round"/>
    <!-- stem & leaves -->
    <path d="M0 4 C 0 24 0 34 0 44" stroke="#9E4031" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M0 26 C 12 20 22 24 26 34 C 14 36 4 32 0 26 Z" fill="#C56B5A"/>
    <path d="M0 34 C -12 28 -22 32 -26 42 C -14 44 -4 40 0 34 Z" fill="#9E4031"/>
  </g>

  <!-- Wordmark -->
  <text x="260" y="178" text-anchor="middle"
        font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="600" letter-spacing="18"
        fill="#2B1A16">ANJA'S</text>

  <!-- Hairline -->
  <line x1="150" y1="206" x2="370" y2="206" stroke="#9E4031" stroke-width="1" opacity="0.55"/>

  <!-- Tagline -->
  <text x="260" y="230" text-anchor="middle"
        font-family="Montserrat, 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="500" letter-spacing="6"
        fill="#9E4031">FLOWERS &amp; ROSES &#183; TIRANA</text>
</svg>
